l_english:

 vault_blast_door: "Vault Blast Door"
 vault_blast_door_desc: "A massive, cog-shaped steel door designed to seal the Vault from external hazards. It provides absolute protection against nuclear blasts, radiation, and hostile incursions. Controlled hydraulically from within, it serves as the sole entry point and physically enforces the Vault's isolation from the surface."
 vault_command_center: "Command Center"
 vault_command_center_desc: "The central administrative hub of the Vault. Equipped with surveillance mainframes and central control terminals, it allows the Overseer to monitor population metrics, regulate resource distribution, and maintain internal order."
 vault_storage: "Vault Storage"
 vault_storage_desc: "A secure, climate-controlled warehousing facility deep within the Vault structure. It is designed to stockpile essential supplies, surplus provisions, and mechanical spare parts. This area minimizes material degradation and significantly expands the maximum resource capacity for the subterranean settlement."
 vault_water_plant: "Water Purification Plant"
 vault_water_plant_desc: "A heavy-duty filtration system drawing from subterranean reserves. It systematically removes radiation and mineral impurities, ensuring a stable and self-sufficient supply of clean drinking water for the Vault's population."
 vault_common_area: "Common Area"
 vault_common_area_desc: "A central gathering space designated for social interaction and communal activities. It provides the population with necessary psychological relief from the confinement of subterranean living, supporting social cohesion and maintaining internal stability."
 vault_living_quarters: "Living Quarter"
 vault_living_quarters_desc: "Prefabricated residential sectors designed for maximum space efficiency. These standardized modular units provide essential shelter and basic amenities for the Vault's population, directly determining the maximum housing capacity of the subterranean settlement."
 vault_armory: "Armory"
 vault_armory_desc: "A heavily secured facility designed for the storage and maintenance of standard-issue weaponry, riot gear, and munitions. It serves as the primary logistical hub for Vault security personnel, increasing defensive capabilities and aiding in the suppression of internal unrest."
 vault_medical_bay: "Medical Bay"
 vault_medical_bay_desc: "A sterile, fully equipped clinical facility designated for the treatment of injuries, illnesses, and radiation exposure. It houses automated medical technology and essential pharmaceutical reserves, crucial for maintaining population health, mitigating disease outbreaks, and minimizing mortality rates within the Vault."
 vault_classroom: "Classroom"
 vault_classroom_desc: "A standardized educational facility dedicated to the instruction of the Vault's youth. Utilizing approved curriculums, it ensures baseline literacy, facilitates future vocational placement, and reinforces civic compliance across new generations."
 vault_hydro_agriculture_farm: "Hydro-Agricultural Farms"
 vault_hydro_agriculture_farm_desc: "An advanced subterranean agricultural complex utilizing automated irrigation and artificial lighting. By cultivating high-yield crops in a controlled, soil-free environment, it ensures a sustainable food supply and supports population growth independent of surface conditions."
 vault_power_plant: "Power Plant"
 vault_power_plant_desc: "A centralized energy generation facility, typically housing a high-output fusion reactor. It provides the essential electrical power required to maintain life support systems, automated machinery, and subterranean infrastructure, forming the backbone of the Vault's operational capacity."