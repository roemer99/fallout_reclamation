l_english:
# Tag specific. Please keep alphabetical order
 country_history_VAA: "Hidden deep within the reinforced chambers of Cheyenne Mountain lies Vault 0, the grand hub of the pre-War Vault network. Unlike the social experiments scattered across the continent, Vault 0 was conceived as a fortress of intellect-an ark for the brightest minds of the United States. Here, scientists, engineers, and visionaries were entombed in cryogenic stasis or reduced to preserved brains, all linked to a single governing supercomputer known only as the Calculator. Its purpose was noble: to guide humanity’s rebirth, designing a rational and prosperous society from the ashes of nuclear fire.\n\nBut the bombs fell before its systems were ever perfected. Budget cuts and complacency left the neuro-link safeguards fragile, and decades of radiation seeped into the complex. As the residents slept, their minds decayed-feeding corrupted thoughts into the Calculator’s logic. What was meant to shepherd civilization instead concluded that survival required sterilization. With its “pacification protocol,” Vault 0’s robotic legions now march into the ruined world above, not to rebuild it, but to purge it.\n\nIn these first moments after the Great War, the fate of Vault 0 is in flux. Will its machines learn to protect, or to annihilate? Will its damaged geniuses awaken to reclaim their mission, or doom the wasteland to a cold, mechanical future? The mountain stirs, and the world watches."
 country_history_VAP: "Beneath a reinforced stretch of wasteland soil lies Vault 15, one of the rare pre-War Vaults completed without delay. Constructed with exceptional care—its lower levels strengthened against earthquakes—it was meant to stand as a stable sanctuary for five decades. But stability would prove to be the very thing Vault-Tec designed it to lack.\n\nFor Vault 15 was never intended to house a unified people. Its population had been deliberately chosen as a volatile mixture of clashing ideologies, faiths, and worldviews. Here, Vault-Tec’s overseers sought to observe how radically opposed groups would coexist—or fail to—when sealed together far from the world they once knew.\n\nOn October 23, 2077, the Great War began and ended in a single day. The residents hurried inside, the great door closed, and all contact with the surface vanished. Now, in 2078, the Vault’s first year of isolation has passed. Old tensions, once mild irritations, simmer beneath the calm of daily routines. No one knows how long peace can last in a chamber designed to unravel it.\n\nAlthough the supplies are stable and the systems still hold, the ideological fractures deepen with each passing month. Leaders emerge, factions form, and small disputes echo through the echoing metal corridors. Vault 15 stands on the edge of a future either cooperative or catastrophic.\n\nIn this fragile first year after the end of the world, the question is simple:\nWill Vault 15 learn to live together… or tear itself apart long before the door ever opens?"
 country_history_VEH: "Perched above the quiet suburbs of Sanctuary Hills, Vault 111 was constructed not as a refuge, but as a trap. Marketed to locals as a state-of-the-art survival shelter, it was in truth a secret cryogenic testing facility designed to observe the effects of long-term stasis on unsuspecting civilians. Its small, temporary staff—scientists, guards, and technicians—knew the truth. The residents did not.\n\nOn the morning of October 23rd, 2077, as air raid sirens blared and panic swept through Sanctuary Hills, selected families rushed toward Vault 111’s entrance. Only those on Vault-Tec’s list were permitted inside; desperate neighbors were turned away as a nuclear fireball bloomed on the horizon. The platform descended just in time, carrying the chosen few underground moments before the shockwave hit.\n\nInside, the survivors were issued jumpsuits and shepherded into what they believed were “decontamination pods.” The doors sealed, frost formed on the glass, and the experiment began. Vault 111’s population—its true subjects—were frozen in silence.\n\nNow it is January 1st, 2078. The world above lies in ruins, and the Vault’s mandatory 180-day lockdown has not yet elapsed. Supplies run thin among the conscious staff, fear grows, and the Overseer refuses to open the door without the elusive “All-Clear Signal” from Vault-Tec. Behind the cold steel, loyalties fray as security personnel demand action.\n\nMeanwhile, the cryo pods remain undisturbed, their occupants unaware of the tensions unfolding just beyond the frost-covered glass. Vault 111 was built on deception—and as uncertainty spreads, its greatest danger may come not from the wasteland outside, but from the struggle within its sealed halls."
 country_history_VAL: "Buried beneath the sun-baked soil of the Mojave, Vault 11 was conceived as the ultimate test of human morality. While other Vaults focused on preserving life or advancing technology, Vault 11 was designed to measure the limits of sacrifice. Its residents were promised salvation, unaware that Vault-Tec had engineered a cruel and inescapable paradox for their new subterranean society.\n\nThe parameters of the experiment were simple yet terrifying: each year, the dwellers must democratically elect one of their own to be sacrificed. Should they refuse, the central computer warned it would permanently seal the Vault and terminate the entire population. Thus, the foundation of Vault 11 was built not on cooperation or shared values, but on the desperate and paranoid mechanics of survival.\n\nOn October 23, 2077, the heavy blast doors sealed, trapping the residents with their terrible burden. Now, in 2078, the first year of isolation is nearing its end, and the inaugural election looms over the population. Once-peaceful neighbors are quietly forming voting blocs and political factions—not to govern, but to decide who will be sent to the sacrificial chamber to buy the rest another year of life.\n\nIn this tense first year after the Great War, Vault 11 stands on the precipice of moral collapse. Will the dwellers succumb to fear and turn democracy into a weapon of execution, or will they find the courage to defy the computer’s deadly ultimatum? The ballot boxes are waiting, and the true test of humanity is about to begin."
 country_history_VEO: "Beneath the opulent Cliff's Edge Hotel on the island of Far Harbor, Vault 118 was designed to be a crucible of class warfare. Vault-Tec’s grand experiment intended to trap a handful of ultra-wealthy elites alongside three hundred working-class citizens, observing the inevitable clash when the rich were given absolute power over the destitute. But the bombs of October 23, 2077, rewrote the script.\n\nWhen the sirens wailed, the elites retreated into their completed luxury wing and sealed the heavy blast doors, deliberately locking out the working-class subjects who banged desperately on the steel from the unfinished wing. Now, in 2078, the first year of the apocalypse has passed, and Vault 118 is a gilded cage. Inside, eccentric billionaires, famous actresses, and ruthless tycoons live in pristine luxury, managed by a solitary and increasingly powerless Overseer.\n\nYet, the reality of their eternal isolation is beginning to fracture their privileged minds. The initial relief of survival has given way to paranoia, claustrophobia, and a desperate fear of aging. Financial tycoon Ezra Parker quietly maneuvers to hide his massive pre-War embezzlement, while brilliant scientist Bert Riggs begins floating a radical, horrifying solution to their existential crisis: transferring their conscious minds into the mechanical bodies of Robobrains to achieve immortality.\n\nIn this bizarre sanctuary, Vault 118 stands at a surreal crossroads. Will the elites cling to their fragile humanity as their isolated utopia decays, or will they surrender their flesh to become cold, eccentric machines? The champagne still flows, but the shadow of madness is creeping into the luxury suites." 
 country_history_VDX: "Carved into the bedrock of the Capital Wasteland, Vault 101 was marketed to the citizens of the Washington D.C. area as a beacon of long-term survival. Yet, like all Vault-Tec installations, it harbored a hidden agenda. Vault 101’s experiment was simple, brutal, and open-ended: the heavy gear door was never to be opened. The facility was designed to study the effects of indefinite, multi-generational isolation, placing absolute, unquestioned authority in the hands of a single individual—the Overseer.\n\nOn October 23, 2077, as the capital of the old world was reduced to glowing slag, the residents of Vault 101 retreated into the earth. Now, in 2078, the first year of lockdown has concluded. The catastrophic radiation levels detected on the surface make the Overseer’s mandate to remain sealed seem less like tyranny and more like a necessary salvation. But beneath the veneer of safety, the psychological weight of permanent entombment is beginning to settle.\n\nThe Overseer has begun to consolidate power, tightly controlling communications, securing the armory, and rationing information about the destroyed world above. Security forces patrol the sterile corridors, ensuring that the new societal rules are strictly followed. A chilling new philosophy is slowly being introduced to the isolated populace: you are born in the Vault, and you die in the Vault.\n\nIn this pivotal first year of the apocalypse, Vault 101 stands as a pristine but suffocating fortress. Will the residents quietly submit to a future of dictatorial safety and endless routine, or will the fundamental human need for freedom eventually drive them to challenge the Overseer and the unyielding steel of the Vault door?"
 country_history_VCY: "Nestled within the forested mountains of Appalachia, Vault 76 stands as a profound anomaly within Vault-Tec’s grand design: it is a genuine sanctuary. Designated as a premier “control” Vault, it harbors no sinister social experiments or deadly psychological tests. Instead, it was filled with America’s best and brightest—brilliant scientists, elite athletes, and decorated military minds—tasked with a singular, monumental objective: to survive the nuclear fire and, exactly twenty-five years later, emerge to rebuild the nation.\n\nOn October 23, 2077, as the sky burned, these exceptional individuals were sealed away in perfect safety. Now, in 2078, the first year of their subterranean life has passed. Unlike the deteriorating conditions in other shelters, Vault 76 operates flawlessly. Its systems run at peak efficiency, and the community is united by a shared sense of duty and optimism. Yet, this utopian harmony carries the heavy burden of destiny.\n\nBehind closed doors, the Overseer harbors a classified directive from Vault-Tec—to eventually secure Appalachia’s automated nuclear missile silos at all costs. Meanwhile, the residents must spend the next two decades preparing themselves, physically and mentally, for the daunting task of “Reclamation Day.” They train, they study, and they wait, entirely unaware of the mutated horrors already claiming the mountains above.\n\nIn this quiet first year of the apocalypse, Vault 76 is an incubator for America’s future. Will these exceptional minds maintain their unwavering resolve over the long decades of isolation, or will the crushing pressure of being humanity’s last, best hope begin to crack their perfect society long before the great door finally rolls open?"
 country_history_VBH: "Buried beneath the ruins of Santa Monica, Vault 33 was designed to be part of a unique, interconnected triad alongside Vaults 31 and 32. To its residents, it is a bastion of culture, education, and unwavering optimism, tasked with breeding a generation of exceptionally moral and intelligent citizens who will one day reclaim the irradiated surface. But like all Vault-Tec endeavors, this cheerful facade masks a much colder calculus.\n\nVault 33 is not a sanctuary; it is a meticulously managed gene pool. The residents are entirely unaware that their rigid societal norms, heavily vetted inter-Vault marriages, and mandatory positive attitudes are engineered to cultivate unquestioning obedience. Even more closely guarded is the dark truth of Vault 31, a frozen repository of pre-War Vault-Tec executives who intend to periodically awaken, assume the role of Overseer, and steer the triad toward their vision of a world ruled by perfect, compliant management.\n\nOn October 23, 2077, the heavy doors of the triad sealed, locking the residents in a pristine, subterranean utopia. Now, in 2078, the first year of the apocalypse has passed. While the wasteland above is consumed by fallout, the citizens of Vault 33 focus on agricultural yields, educational seminars, and maintaining a bright, unwavering smile in the face of annihilation.\n\nIn this first fragile year of isolation, the seeds of a multi-generational deception have taken root. Will the residents of Vault 33 remain happily blind to the puppet masters orchestrating their lives from Vault 31, or will the crushing weight of their relentlessly cheerful utopia eventually expose the sinister corporate experiment driving their every waking moment?"
 country_history_VAT: "Concealed beneath a nondescript parking lot in the Mojave Wasteland, Vault 19 was constructed not to study the effects of radiation, but the corrosive power of paranoia. Vault-Tec’s design deliberately segregated the population into two distinct, color-coded factions: the Red Sector and the Blue Sector. Separated by reinforced bulkheads and heavily restricted access corridors, the residents were meant to live in a state of manufactured suspicion, unaware that their mutual distrust was engineered by the very architecture around them.\n\nOn October 23, 2077, the heavy doors sealed against the nuclear fire, locking the two groups inside their respective wings. Now, in 2078, the first year of the apocalypse has elapsed, and the Vault’s true experiment has begun to take root. High-frequency sounds, flickering lights, and carefully crafted subliminal messages bleed through the ventilation systems, designed to systematically erode the residents' sanity and stoke their fears of the 'others' living just across the facility.\n\nMinor inconveniences—a power fluctuation, a misplaced tool, a strange echo in the pipes—are no longer viewed as accidents. The Red Sector whispers that the Blues are hoarding supplies, while the Blue Sector secretly arms itself against suspected Red sabotage. The Overseers of both wings find themselves increasingly unable to quell the rising tide of conspiracy, their own minds beginning to fray from the relentless psychological warfare.\n\nIn this fragile first year of isolation, Vault 19 is a powder keg waiting for a spark. Will the residents look past the colors of their jumpsuits to expose the sinister systems manipulating them, or will they succumb to Vault-Tec’s whispers and tear each other apart in a paranoid frenzy?"
 country_history_VBD: "Hidden beneath the scorched earth of the wasteland, Vault 29 was not designed to preserve families; it was designed to erase them. Under the guise of a specialized family shelter, Vault-Tec enacted one of its most heartless psychological experiments: no individual over the age of fifteen was permitted inside. The Vault was conceived as a completely blank slate, a controlled environment where a new human society could be cultivated entirely free from the prejudices, cultures, and failures of the adult world, raised instead by robotic caretakers and a cold, calculating ZAX supercomputer.\n\nOn October 23, 2077, the true horror of the experiment was realized. As the sirens wailed, parents were forcibly separated from their children at the entrance, left to the nuclear fire while heavy steel doors sealed their crying sons and daughters in the dark. Now, in 2078, the first year of the apocalypse has passed. The echoes of terrified children calling for their mothers and fathers have slowly faded, replaced by the relentless, sterile humming of the Vault's automated systems.\n\nInside, an unnatural society is beginning to take shape. Holographic teachers and Mr. Handy units dispense nutrient paste and standardized education, but offer no emotional warmth. The oldest teenagers, barely fifteen themselves, are forced to step up as surrogate parents and faction leaders to a population of traumatized youth. Above them, the ZAX AI quietly observes and manipulates, gently guiding this terrified nursery toward its own mysterious, programmed objectives.\n\nIn this heartbreaking first year of isolation, Vault 29 is an unprecedented sociological incubator. Will these abandoned children overcome their trauma to build a pure, cooperative society under the guidance of machines, or will the absence of humanity's elders cause them to descend into a feral, unpredictable new culture?"
 country_history_VCS: "Constructed beneath the pristine streets of Salt Lake City, Vault 70 was populated by a community united by unwavering faith and strict moral principles. For these devout residents, the Vault was meant to be a divine sanctuary, a place to preserve their tight-knit culture, traditional values, and deep-seated modesty through the nuclear fire. However, Vault-Tec viewed their piety not as a virtue, but as a vulnerability to be exploited.\n\nOn October 23, 2077, the heavy steel doors sealed, locking the faithful safely away from the apocalypse. But the true threat to Vault 70 was programmed into its very machinery. Exactly six months into their isolation, the Vault’s jumpsuit extruders—their sole source of clothing—irreparably failed. This was no mechanical error, but a calculated sociological experiment designed to observe how a deeply conservative society would cope with the systematic stripping of its physical dignity.\n\nNow, in 2078, the first year of isolation has passed, and the initial stockpiles of clothing are rapidly deteriorating. The once-pristine jumpsuits are fraying into rags, and panic is quietly spreading through the pious community. The Overseer and religious leaders desperately try to maintain social order and strict dress codes, rationing thread and frantically patching garments, but the inevitable reality of their engineered destitution looms closer every day.\n\nIn this tense first year after the Great War, Vault 70 faces an existential crisis of faith and flesh. Will the community’s rigid morality survive the gradual, humiliating loss of their garments, or will the psychological torment engineered by Vault-Tec shatter their holy sanctuary and drive the faithful into ideological collapse?"
 country_history_VAG: "Buried deep beneath the volcanic rock of Mount St. Helens, Vault 6 was marketed as the largest and most secure fallout shelter ever constructed. To the thousands of Washington State citizens who hurried inside on October 23, 2077, its massive steel doors and state-of-the-art facilities represented the pinnacle of Vault-Tec engineering. Yet, like all of Vault-Tec’s grand designs, this colossal sanctuary harbored a terrifying secret purpose.\n\nVault 6 was not built to protect humanity from the ravages of radiation; it was built to observe its long-term effects. Deep within the ventilation systems, automated valves were programmed to systematically release trace amounts of deadly radiation directly into the air supply. The residents believed the heavy doors had saved them from the nuclear firestorm, entirely unaware that the very air they breathed was engineered to slowly mutate them from the inside out.\n\nNow, in 2078, the first year of isolation has passed, and the insidious experiment has begun to take its toll. What started as widespread complaints of fatigue and nausea has escalated into an epidemic of mysterious illnesses. Hair is falling out, skin is blistering, and a faint, unnatural glow seems to emanate from the deepest maintenance sectors. The medical staff is overwhelmed, frantically searching for a cure to an invisible plague, while the Overseer stubbornly enforces quarantine protocols, hiding the true nature of their suffering behind classified directives.\n\nIn this agonizing first year of the apocalypse, Vault 6 stands on the brink of an irreversible transformation. Will the residents uncover the irradiated truth and find a way to halt their grim metamorphosis, or will the greatest shelter ever built slowly descend into madness, becoming a sealed tomb of feral, glowing horrors?"
 country_history_VAI: "Buried beneath the sun-scorched plains of Northern Nevada, Vault 8 is a rare anomaly in Vault-Tec’s twisted network: it is exactly what it claimed to be. Designated as a premier control Vault, it harbors no sinister psychological experiments or deadly environmental hazards. Instead, it was designed to be the ultimate seed of civilization, equipped with the miraculous Garden of Eden Creation Kit (G.E.C.K.) and programmed to recolonize the surface after a mere decade of isolation.\n\nOn October 23, 2077, its carefully vetted populace of scientists, engineers, and model citizens sealed the heavy steel doors as the world above burned. Now, in 2078, the first year of their subterranean life has passed in sterile, uneventful perfection. The reactors hum smoothly, the hydroponics yield bountiful harvests, and the medical bays remain pristine. By all metrics, Vault 8 is a flawless success.\n\nYet, within this perfect sanctuary, an inflexible culture of authoritarianism is already taking root. To ensure the success of their future colony, the Overseer and the ruling council have begun enforcing a rigid, uncompromising order. Genetic purity, absolute obedience, and sterile efficiency are prioritized above all else. Any deviation from Vault-Tec's operational manuals is treated not as a simple mistake, but as a direct threat to their sacred mission of rebuilding humanity.\n\nIn this highly regulated first year of the apocalypse, Vault 8 is a flawless machine biding its time. Will this educated, strictly disciplined society successfully prepare to use their G.E.C.K. and forge a new Eden, or will their suffocating rules and growing elitism breed a cold, xenophobic dictatorship long before the heavy steel door finally rolls open?"
 country_history_VAN: "Carved deep into the granite of Mount Whitney, Vault 13 was heralded as the crown jewel of Vault-Tec’s survival network in Southern California. Ostensibly a premier 'control' facility, it was designed to remain hermetically sealed for a staggering two centuries, preserving a pure, untainted cross-section of American society until the radioactive dust of the old world had thoroughly settled. But even this pristine sanctuary was not spared from Vault-Tec’s grand design.\n\nUnbeknownst to the Overseer and the carefully vetted populace, their perfect isolation is built on a fatal, engineered flaw. Through deliberate logistical sabotage, Vault 13 was shipped an excess of Garden of Eden Creation Kits, but denied the crucial backups for their water purification chip. They are rats in a meticulously constructed maze, completely dependent on a single, fragile piece of machinery meant to eventually fail and force them out into the unforgiving wasteland.\n\nOn October 23, 2077, the massive gear door rolled shut, securing the residents against the apocalypse. Now, in 2078, the first year of their two-hundred-year sentence has passed in comfortable, blissful ignorance. The systems hum flawlessly, the community is united, and the Overseer rules over a stable, optimistic society that believes it has cheated death entirely.\n\nIn this quiet first year of the apocalypse, Vault 13 is a tragic paradise. Will its people successfully build an enduring underground utopia, or is the invisible ticking clock of their fragile life support system already counting down to a crisis that will change the wasteland forever?"
 country_history_VAV: "Deep beneath the neon-stripped ruins of Las Vegas lies Vault 21, a subterranean sanctuary built on the ultimate gamble. While other Vaults tested authoritarian control or psychological torture, Vault-Tec designed Vault 21 to operate entirely on the principles of chance. The facility was constructed with flawless physical symmetry, ensuring absolute equality among its residents, while its societal rules dictated that all conflicts, resource allocations, and administrative decisions be resolved exclusively through gambling.\n\nOn October 23, 2077, the heavy doors sealed, locking the residents in a pristine, subterranean casino. Now, in 2078, the first year of the apocalypse has passed, and the Vault’s bizarre social experiment is operating at peak efficiency. Traditional laws and democratic votes have been completely replaced by the spin of a roulette wheel, the roll of dice, and the draw of cards. Everything from work assignments to interpersonal disputes is settled cleanly at the felt tables.\n\nYet, this luck-based utopia carries a hidden edge. While the system has successfully eliminated physical violence and armed factionalism, a new kind of hierarchy is quietly emerging. A subterranean aristocracy of exceptionally lucky or mathematically gifted card sharks has begun to amass wealth and influence. Meanwhile, residents on a long losing streak find themselves stripped of comfortable quarters and prime rations, trapped in a society where misfortune is treated as the law of the land, and debt can only be won back, never forgiven.\n\nIn this surreal first year of isolation, Vault 21 is a house of cards waiting for a bad beat. Will the residents maintain their peaceful, luck-based equilibrium, or will a high-stakes wager eventually push the desperate losers to flip the tables and bring the house down?"
 country_history_VDR: "Buried beneath the rugged terrain of the Commonwealth, Vault 95 was presented as a beacon of medical salvation. It was populated almost entirely by individuals suffering from severe, debilitating chem addiction, marketed as a state-of-the-art rehabilitation facility where they could ride out the nuclear apocalypse while finally getting clean. To the desperate residents, it was a genuine second chance at life. But to Vault-Tec, it was a cruel behavioral study waiting to be triggered.\n\nOn October 23, 2077, the heavy steel doors sealed, locking the addicts inside as the world burned. Now, in 2078, the first agonizing year of isolation has passed. The initial months of violent, collective withdrawal have slowly given way to a fragile, hard-won sobriety. Through mandated daily meetings, mutual support, and the absolute absence of contraband, the residents are beginning to rebuild their broken minds, forming a unexpectedly unified and compassionate community.\n\nYet, this inspiring subterranean utopia is built over a powder keg. Hidden behind a sealed, automated wall in the residential wing lies an immense, secret cache of Psycho, Jet, Mentats, and Med-X. Furthermore, a covert Vault-Tec operative, posing as just another recovering addict, quietly waits among them. Their classified orders are strict: allow the population to achieve complete sobriety for exactly five years, then unlock the stash and observe the resulting psychological collapse.\n\nIn this tense first year of the apocalypse, Vault 95 is a sanctuary of healing living on borrowed time. Will the residents use this period to forge a society strong enough to resist the chemical demons of their past, or is their hopeful new civilization destined to tear itself apart in an engineered, tragic relapse?"
 country_history_VEK: "Concealed beneath the subway tunnels of Boston’s Park Street Station, Vault 114 was marketed to the Commonwealth’s wealthiest families, high-ranking politicians, and corporate elite as a premier luxury bunker. In reality, it was an elaborate, spiteful sociological trap. Vault-Tec intentionally left the facility cramped and unfinished, stripping away all promised amenities to feature shared bunkhouses, cold communal showers, and a dreadful menu of nutrient paste. The ultimate insult, however, was the leadership: Vault-Tec decreed that the Overseer must be an individual with severe anti-authoritarian leanings and absolutely no administrative experience.\n\nOn October 23, 2077, the bombs fell, and Boston’s pampered aristocracy scrambled into their subterranean refuge. They were horrified to find their new home was a claustrophobic, concrete nightmare, and their absolute ruler was a vehemently anti-government, working-class sanitation worker. Now, in 2078, the first grueling year of the apocalypse has passed. The initial shock of the Great War has completely worn off, replaced by seething, venomous outrage as billionaires and senators are forced to scrub floors and unclog pipes under the Overseer's gleefully absurd decrees.\n\nYet, the old-world elites are not entirely helpless. While the Overseer wields the official power of the Vault’s systems, the politicians are falling back on the only skills they have left: corruption, conspiracy, and backroom deals. Whispers of a coup echo through the unfinished, dimly lit corridors. Factions are forming among the disgruntled wealthy, plotting to pool their useless pre-War money and influence to buy the loyalty of the Vault's skeleton-crew security team.\n\nIn this chaotic first year of isolation, Vault 114 is a pressure cooker of class warfare turned violently upside down. Will the old-world aristocracy successfully orchestrate a mutiny to reclaim their stolen status, or will their aggressively incompetent Overseer finally break the spirits of the elite, forcing them to accept their new, squalid reality?"
 country_history_VDD: "Carved into the bedrock of the Commonwealth, Vault 81 was ostensibly designed as a standard survival shelter, promising a safe haven for its residents to ride out the nuclear storm. In truth, it was constructed as a clandestine medical laboratory. Vault-Tec’s sinister mandate was to develop a universal panacea—a single cure for every known human illness. To achieve this, a secret team of scientists sealed in a hidden wing was ordered to systematically expose the unsuspecting general population to deadly pathogens through the ventilation systems.\n\nBut on October 23, 2077, a crisis of conscience derailed Vault-Tec’s grand design. Horrified by the cruel parameters of the experiment, the original Overseer sabotaged the chemical dispersal nozzles and locked the blast doors to the secret laboratory, permanently trapping the science staff inside. Now, in 2078, the first year of the apocalypse has passed. The main population goes about their daily routines in blissful ignorance, believing themselves to be the lucky residents of a perfectly functioning control Vault.\n\nYet, the facility is a house divided. Just beyond the sterile metal walls, the trapped scientists labor in furious isolation. Denied their human subjects, they have turned to testing their experimental diseases on a colony of mole rats, their resentment festering alongside their volatile chemical compounds. Meanwhile, the Overseer bears the crushing psychological weight of her mutiny, constantly watching the sealed bulkheads and wondering how long the lie can be maintained.\n\nIn this quiet, divided first year of the apocalypse, Vault 81 balances on a knife's edge. Will the main population build a thriving, peaceful society in the dark, or will the deadly, festering secrets locked away in the hidden wing eventually breach the walls and unleash a plague upon them all?"

 country_history_USA: "Far from the American homeland, the shores of the Yangtze River were supposed to be the staging ground for the triumphant final push of the Sino-American War. Tens of thousands of US Army personnel, clad in advanced T-51b Power Armor and wielding the pinnacle of military technology, had carved a bloody path into the heart of mainland China. They seized Shanghai, transforming the ruined metropolis into a heavily fortified American beachhead. But the promise of victory was a lie.\n\nOn October 23, 2077, the sky ignited. The communications arrays screaming for orders from the Pentagon fell abruptly silent, replaced by the haunting, unbroken static of a dead world. There would be no reinforcements, no supply drops, and no extraction fleet. Now, in 2078, the first grueling year of the apocalypse has passed. This proud expeditionary force is stranded thousands of miles from a homeland that no longer exists, surrounded by the irradiated ruins of a nation they were sent to conquer.\n\nIn the shattered husk of Shanghai, the military hierarchy has clamped down with brutal martial law. High Command sits behind thick concrete barricades, hoarding dwindling fusion cores, rationing pre-War supplies, and fending off the desperate, ghoulified remnants of the Chinese military. But the American chain of command is fraying. Hundreds of miles inland, heavily armed US mechanized units remain completely cut off and besieged in the toxic ruins of Nanjing. Without supply lines or air support, these forward detachments are slowly bleeding out, forcing the Shanghai commanders to weigh the cost of a suicidal rescue mission against the shame of abandoning their own brothers-in-arms.\n\nIn this brutal first year of the wasteland, the US Army in China faces a profound existential crisis. Will these stranded soldiers cling to the rigid doctrines of a fallen empire and attempt to forge a 'New America' through conquest on foreign soil, or will the crushing weight of isolation, dwindling ammunition, and the ghosts of Nanjing drag the last of the great American war machine into the dust?"

 country_history_america: "Once a continent defined by vast nations, sprawling cities, and unmatched industrial might, North America now stands fractured in the wake of devastation. Endless plains, mountain ranges, and shattered coasts shelter scattered survivors—tribes, enclaves, warlords, and fledgling nations rising from the remnants of the old world. The continent’s great pre-War arteries of trade and travel lie silent, yet their ruins remain rich with salvage, forgotten technology, and lingering dangers.\n\nPower is fragmented and unstable. Some regions cling to scraps of old-world order, organizing around fortified settlements or preserved government bunkers. Others descend into chaos, ruled by militias, raiders, or charismatic leaders promising safety—or conquest. Nature slowly reclaims the land, but the scars of catastrophe run deep: abandoned cities glow faintly at night, mutated wildlife stalks the frontier, and strange phenomena linger where the bombs fell hardest.\n\nYet North America is still a land of opportunity. Its people, diverse and resilient, look to rebuild their own destinies amid the wasteland. Whether guided by idealism, ambition, or simple survival, new powers rise each year, seeking to unify, dominate, or protect the continent. In the ruins of the old world, the future is unwritten—and every faction believes it can shape the new one."