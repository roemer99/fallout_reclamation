l_english:
 flavor_vaults.1.title: "One Year Under the Surface"
 flavor_vaults.1.desc: "It has been precisely one year since the lead-lined gates were struck shut, severing our people from the sun-drenched lands of our ancestors. What was initially a desperate scramble for sanctuary has, through sheer toil and the cold necessity of survival, evolved into a functioning subterranean state. The hum of the atmospheric regulators has replaced the wind, and the sterile glow of the corridors has become our only firmament.\n\nHowever, as the anniversary of the Sealing approaches, the internal pressures of our secluded life have begun to manifest. While the common citizenry looks for a reprieve to celebrate our continued existence, the keepers of our dwindling resources warn that any diversion of power or rations for the sake of sentimentality is a luxury we can ill afford. We stand at a crossroads between fostering the morale of a displaced people and the ruthless pragmatism required to see a second year."
 flavor_vaults.1.a: "Celebrate Our Survival"
 flavor_vaults.1.b: "Preserve Our Ressources"