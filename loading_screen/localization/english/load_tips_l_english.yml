l_english:
 LOADING_TIP_0: " #T \"War... War never changes.\"#! \n #tooltip_subheading — Intro text of every Fallout game since Fallout 1#!"
 LOADING_TIP_1: " #T \"Thou shalt get sidetracked by bullshit every goddamn time.\"#! \n #tooltip_subheading — Golden Rule of the Wasteland, Cooper Howard#!"
 LOADING_TIP_2: " #T \"To have done the things I have done in the name of progress and healing. It was madness.\"#! \n #tooltip_subheading — While speaking to the Master in the Cathedral, Fallout 1#!"
 LOADING_TIP_3: " #T \"I showed them total warfare. Like I said, there's a lot you can learn from old books.\"#! \n #tooltip_subheading — Ceasar, Leader of Ceasars Legion, Fallout: New Vegas#!"
 LOADING_TIP_4: " #T \"The thing about happiness is that you only know you had it when it's gone.\"#! \n #tooltip_subheading — Conrad Kellogg, Fallout 4#!"
 LOADING_TIP_5: " #T \"It's the end of the world, all over again.\"#! \n #tooltip_subheading — Sole Survivor when he destroyed the Institute, Fallout 4#!"
 LOADING_TIP_6: " #T \"Ideals are strengthened by the challenges they endure.\"#! \n #tooltip_subheading — The Courier while talking to the BoS, Fallout: New Vegas#!"
 LOADING_TIP_7: " #T \"You Saved Us, But You'll Kill Us. I'm Sorry. You're A Hero. And You Have To Leave.\"#! \n #tooltip_subheading — Overseer of Vault 13 to the Vault Dweller after he brings the water chip, Fallout 1#!"
 LOADING_TIP_8: " #T \"It's said war, war never changes. Men do, through the roads they walk.\"#! \n #tooltip_subheading — Ulysses, Fallout: New Vegas#!"
 LOADING_TIP_9: " #T \"And don't get me started on the futility of dusting a collapsed house!\"#! \n #tooltip_subheading — Codsworth after finding out his master is alive, Fallout 4#!"
 LOADING_TIP_10: " #T \"Victory shall be ours, it shall be swift, and it will be honest; purchased with blood.\"#! \n #tooltip_subheading — Lanius, Legate of Caesars Legion, Fallout: New Vegas#!"
 LOADING_TIP_11: " #T \"Death is a preferable alternative to communism.\"#! \n #tooltip_subheading — Liberty Prime, giant combat robot build to fight against the PRC, Fallout 3#!"
 LOADING_TIP_12: " #T \"It is a knight’s duty to better this fallen world.\"#! \n #tooltip_subheading — Squirre Maximus while talking to his dying Paladin, Fallout Season 1#!"
 LOADING_TIP_13: " #T \"You come from a world of rules, of laws. This place is indifferent to all of that.\"#! \n #tooltip_subheading — Doctor Wilzig warns Lucy about the Wasteland, Fallout Season 1#!"
 LOADING_TIP_14: " #T \"If you only let the bad guys use it, the bad guys win.\"#! \n #tooltip_subheading — Lee Moldaver to Cooper Howard before the bombs fell, Fallout Season 1#!"
 LOADING_TIP_15: " #T \"I may end up looking like you, but I'll never be like you.\"#! \n #tooltip_subheading — Lucy to the ghoulified Cooper Howard, Fallout Season 1#!"
 LOADING_TIP_16: " #T \"Flesh is weak, but steel endures.\"#! \n #tooltip_subheading — Motto of the Brotherhood of Steel, Fallout Season 1#!"
 LOADING_TIP_17: " #T \"There’s a lot of money in selling the end of the world.\"#! \n #tooltip_subheading — Lee Moldaver to Cooper Howard before the bombs fell, Fallout Season 1#!"
 LOADING_TIP_18: " #T \"Everyone wants to save the world, they just… they disagree on how.\"#! \n #tooltip_subheading — Maximus to Lucy, Fallout Season 1#!"
 LOADING_TIP_19: " #T \"If You Want To See The Fate Of Democracies, Look Out The Windows.\"#! \n #tooltip_subheading — Mr. House to the Courier when confronted about his leadership style, Fallout: New Vegas#!"
 LOADING_TIP_20: " #T \"They Asked Me How Well I Understood Theoretical Physics. I Said I Had A Theoretical Degree In Physics. They Said Welcome Aboard.\"#! \n #tooltip_subheading — Fantastic when asked how he got the job, Fallout: New Vegas#!"
 LOADING_TIP_21: " #T \"So What Shall It Be? Do You Join The Unity? Or Do You Die Here? Join! Die! Join! Die!\"#! \n #tooltip_subheading — The Master introduced himself to the Vault Dweller, Fallout 1#!"
 LOADING_TIP_22: " #T \"You look out at this wasteland, looks like chaos. But there's always somebody behind the wheel.\"#! \n #tooltip_subheading — Cooper Howard to Lucy, Fallout Season 1#!"
 LOADING_TIP_23: " #T \"A nuclear event would be a tragedy… but also, an opportunity. Perhaps the greatest opportunity in history. Because when we are the only ones left, there will be no one to fight. A true monopoly.\"#! \n #tooltip_subheading — Barb Howards during a meeting of Vault Tec, Fallout Season 1#!"
 LOADING_TIP_24: " #T \"We’re in the best place in the world. We’re in a vault.\"#! \n #tooltip_subheading — Lucy to Maximus when finding out there in a Vault, Fallout Season 1#!"
 LOADING_TIP_25: " #T \"The entire purpose of my vault was to come up to the surface one day and restart civilization. It’s Reclamation Day, it’s what keeps us all going and… It already happened without us.\"#! \n #tooltip_subheading — Lucy to Maximus when finding out humanity survived also outside of Vaults, Fallout Season 1#!"
 LOADING_TIP_26: " #T \"You need to start acting like a surface dweller.\"#! \n #tooltip_subheading — Doctor Wilzig warns Lucy about the Wasteland, Fallout Season 1#!"
 LOADING_TIP_27: " #T \"The vaults were nothing more than a hole in the ground for rich folks to hide in while the rest of the world burned.\"#! \n #tooltip_subheading — Ma June to Lucyin Filly, Fallout Season 1#!"
 LOADING_TIP_28: " #T \"Democracy is non-negotiable.\"#! \n #tooltip_subheading — Liberty Prime, giant combat robot build to fight against the PRC, Fallout 3#!"
 LOADING_TIP_29: " #T \"I guess I just wanted to show you that there's two sides to every victory. Those who live to revel in it, and those who died making it happen.\"#! \n #tooltip_subheading — Teagan, Fallout 4#!"
 LOADING_TIP_30: " #T \"The Railroad? Aren't they busy liberating vending machines and saving computers?.\"#! \n #tooltip_subheading — Possible text option for the player, Fallout#!"
